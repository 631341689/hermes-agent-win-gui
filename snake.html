<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', 'PingFang SC', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 40px;
  }
  .score-box {
    text-align: center;
  }
  .score-label {
    color: #666;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .score-value {
    color: #00ff88;
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
  }
  .best-box {
    text-align: center;
  }
  .best-label {
    color: #555;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .best-value {
    color: #ff6b6b;
    font-size: 42px;
    font-weight: 700;
    line-height: 1;
  }
  canvas {
    border: 2px solid #1a1a2e;
    border-radius: 8px;
    background: #0d0d1a;
    box-shadow: 0 0 40px rgba(0,255,136,0.08), 0 0 80px rgba(0,255,136,0.03);
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    background: #1a1a2e;
    color: #aaa;
    border: 1px solid #2a2a3e;
    padding: 10px 28px;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  button:hover {
    background: #252540;
    color: #00ff88;
    border-color: #00ff8844;
  }
  .speed-indicator {
    color: #555;
    font-size: 13px;
    letter-spacing: 1px;
  }
  .hint {
    color: #333;
    font-size: 12px;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="score-box">
      <div class="score-label">得分</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="best-box">
      <div class="best-label">最高</div>
      <div class="best-value" id="best">0</div>
    </div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="controls">
    <button id="restartBtn">🔄 重新开始</button>
    <span class="speed-indicator" id="speedLabel">速度: 中</span>
    <button id="speedBtn">⚡ 调速</button>
  </div>
  <div class="hint">↑↓←→ 或 WASD 控制方向 | 空格暂停</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const GRID = 20;
const COLS = canvas.width / GRID;   // 20
const ROWS = canvas.height / GRID;  // 20

const SPEEDS = [
  { name: '慢', interval: 140 },
  { name: '中', interval: 100 },
  { name: '快', interval: 60 },
  { name: '极速', interval: 35 },
];
let speedIdx = 1;

// State
let snake, food, dir, nextDir, score, best, gameOver, paused, loopId;

// --- Init ---
function init() {
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS / 2);
  snake = [
    { x: cx, y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  paused = false;
  updateScoreDisplay();
  spawnFood();
}

function spawnFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  const available = [];
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      if (!occupied.has(`${x},${y}`)) available.push({ x, y });
    }
  }
  food = available.length > 0
    ? available[Math.floor(Math.random() * available.length)]
    : null;
}

// --- Game Loop ---
function update() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame();
    return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  if (food && head.x === food.x && head.y === food.y) {
    score += 10;
    updateScoreDisplay();
    spawnFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid lines (subtle)
  ctx.strokeStyle = '#111122';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(canvas.width, y * GRID);
    ctx.stroke();
  }

  // Snake
  snake.forEach((seg, i) => {
    const t = 1 - i / Math.max(snake.length - 1, 1);
    const r = Math.round(lerp(0, 200, t));
    const g = Math.round(lerp(255, 130, t));
    const b = Math.round(lerp(100, 50, t));
    const alpha = 1 - i * 0.015;

    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    const pad = 1;
    ctx.beginPath();
    roundRect(seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad * 2, GRID - pad * 2, 4);
    ctx.fill();

    // Head glow
    if (i === 0) {
      ctx.fillStyle = 'rgba(0,255,136,0.25)';
      ctx.beginPath();
      ctx.arc(seg.x * GRID + GRID/2, seg.y * GRID + GRID/2, GRID/2 + 3, 0, Math.PI*2);
      ctx.fill();
    }
  });

  // Food
  if (food) {
    const fx = food.x * GRID + GRID/2;
    const fy = food.y * GRID + GRID/2;
    // Glow
    ctx.fillStyle = 'rgba(255,107,107,0.3)';
    ctx.beginPath();
    ctx.arc(fx, fy, GRID/2 + 2, 0, Math.PI*2);
    ctx.fill();
    // Core
    ctx.fillStyle = '#ff6b6b';
    ctx.beginPath();
    ctx.arc(fx, fy, GRID/2 - 2, 0, Math.PI*2);
    ctx.fill();
  }

  // Overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff6b6b';
    ctx.font = 'bold 32px "PingFang SC","Segoe UI",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 10);
    ctx.fillStyle = '#888';
    ctx.font = '14px "PingFang SC","Segoe UI",sans-serif';
    ctx.fillText('按空格键重新开始', canvas.width/2, canvas.height/2 + 30);
  } else if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 28px "PingFang SC","Segoe UI",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('已暂停', canvas.width/2, canvas.height/2);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function lerp(a, b, t) { return a + (b - a) * t; }

function tick() {
  if (!gameOver && !paused) update();
  draw();
}

function loop() {
  tick();
  loopId = setTimeout(loop, SPEEDS[speedIdx].interval);
}

function endGame() {
  gameOver = true;
  if (score > best) {
    best = score;
    document.getElementById('best').textContent = best;
    localStorage.setItem('snake_best', best);
  }
}

function updateScoreDisplay() {
  document.getElementById('score').textContent = score;
}

function restart() {
  clearTimeout(loopId);
  const saved = localStorage.getItem('snake_best');
  best = saved ? parseInt(saved) : 0;
  document.getElementById('best').textContent = best;
  init();
  loop();
}

// --- Input ---
document.addEventListener('keydown', (e) => {
  if (gameOver) {
    if (e.code === 'Space') { e.preventDefault(); restart(); }
    return;
  }
  switch (e.code) {
    case 'ArrowUp':    case 'KeyW': if (dir.y !==  1) nextDir = {x: 0, y:-1}; e.preventDefault(); break;
    case 'ArrowDown':  case 'KeyS': if (dir.y !== -1) nextDir = {x: 0, y: 1}; e.preventDefault(); break;
    case 'ArrowLeft':  case 'KeyA': if (dir.x !==  1) nextDir = {x:-1, y: 0}; e.preventDefault(); break;
    case 'ArrowRight': case 'KeyD': if (dir.x !== -1) nextDir = {x: 1, y: 0}; e.preventDefault(); break;
    case 'Space': paused = !paused; e.preventDefault(); break;
  }
});

// Touch
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
});
canvas.addEventListener('touchend', (e) => {
  if (gameOver) { restart(); return; }
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return; // too small
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && dir.x !== -1) nextDir = {x: 1, y: 0};
    else if (dx < 0 && dir.x !== 1) nextDir = {x:-1, y: 0};
  } else {
    if (dy > 0 && dir.y !== -1) nextDir = {x: 0, y: 1};
    else if (dy < 0 && dir.y !== 1) nextDir = {x: 0, y:-1};
  }
  e.preventDefault();
});

document.getElementById('restartBtn').addEventListener('click', restart);

document.getElementById('speedBtn').addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  document.getElementById('speedLabel').textContent = `速度: ${SPEEDS[speedIdx].name}`;
  clearTimeout(loopId);
  loop();
});

// --- Start ---
const saved = localStorage.getItem('snake_best');
if (saved) best = parseInt(saved);
document.getElementById('best').textContent = best;
init();
loop();
</script>
</body>
</html>
